<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Corazoncito</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a0633 0%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Pantalla de Misterio */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        #overlay h2 {
            color: white;
            font-size: clamp(22px, 5vw, 30px);
            margin-bottom: 25px;
            text-shadow: 0 0 15px #ff2a5f;
            text-align: center;
            padding: 0 20px;
        }

        .btn-misterio {
            padding: 15px 45px;
            font-size: 20px;
            background: #ff2a5f;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px #ff2a5f;
            font-weight: bold;
        }

        #scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 900px;
            max-height: 800px;
        }

        .character {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: clamp(100px, 22vw, 160px);
            z-index: 20;
        }

        #heart-container { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart {
            position: absolute;
            color: #ff2a5f;
            font-size: clamp(18px, 4vw, 26px);
            text-shadow: 0 0 10px #ff2a5f;
            transition: all 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        /* Texto perfectamente centrado */
        .message-container {
            position: absolute;
            left: 50%;
            bottom: 12%;
            transform: translateX(-50%);
            width: 100%;
            text-align: center;
            z-index: 50;
        }

        .message {
            color: #ffffff;
            font-size: clamp(24px, 7vw, 50px);
            font-weight: bold;
            text-shadow: 0 0 20px #ff2a5f, 0 0 40px #ff2a5f;
            opacity: 0;
            transition: opacity 2s ease-in, transform 1.5s ease-out;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: inline-block;
            width: 100%;
        }

        .message.show { 
            opacity: 1; 
            transform: translateY(0);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .confetti {
            position: absolute;
            width: 8px; height: 8px;
            z-index: 30;
            animation: fall var(--d) linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .pulse { animation: heartbeat 1.5s infinite ease-in-out; }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Hola Corazoncito... ❤️<br>¿Tienes un segundo para mí?</h2>
        <button class="btn-misterio" onclick="descubrir()">¡SÍ, CLARO!</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="MILO J - M.A.I (Video Oficial) (1).mp3" type="audio/mpeg">
    </audio>

    <div id="scene">
        <img src="tenor.gif" id="bear" class="character">
        <div id="heart-container"></div>
        <div class="message-container">
            <div id="message" class="message">TE AMO CORAZONCITO</div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        const overlay = document.getElementById('overlay');
        const message = document.getElementById('message');
        const container = document.getElementById('heart-container');

        function descubrir() {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1000);
            audio.play();
            startShooting();
        }

        for (let i = 0; i < 70; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.setProperty('--duration', Math.random() * 3 + 1 + 's');
            document.body.appendChild(star);
        }

        function createConfetti() {
            const colors = ['#ff2a5f', '#ff7b9c', '#ffffff', '#ffb3c6'];
            for (let i = 0; i < 80; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-10px';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.setProperty('--d', Math.random() * 3 + 2 + 's');
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }

        function startShooting() {
            const scene = document.getElementById('scene');
            const isMobile = window.innerWidth < 600;
            
            // Origen de los corazones (desde el oso)
            const startX = isMobile ? 60 : 100; 
            const startY = scene.offsetHeight / 2 + 20;
            
            const numPoints = 50; 
            const scale = isMobile ? (window.innerWidth / 50) : 15;     
            const offsetX = scene.offsetWidth / 2;  
            const offsetY = scene.offsetHeight / 2.5;  
            const speedMs = 120;  

            const heartPositions = [];
            for (let i = Math.PI; i < Math.PI * 3; i += (Math.PI * 2) / numPoints) {
                let x = 16 * Math.pow(Math.sin(i), 3);
                let y = -(13 * Math.cos(i) - 5 * Math.cos(2 * i) - 2 * Math.cos(3 * i) - Math.cos(4 * i));
                heartPositions.push({ x: offsetX + (x * scale), y: offsetY + (y * scale) });
            }

            let currentShot = 0;
            const interval = setInterval(() => {
                if (currentShot >= heartPositions.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        message.classList.add('show');
                        container.classList.add('pulse');
                        createConfetti();
                    }, 600);
                    return;
                }

                const target = heartPositions[currentShot];
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'heart';
                heart.style.left = startX + 'px';
                heart.style.top = startY + 'px';
                container.appendChild(heart);

                setTimeout(() => {
                    heart.style.left = target.x + 'px';
                    heart.style.top = target.y + 'px';
                }, 20);
                currentShot++;
            }, speedMs);
        }
    </script>
</body>
</html>
